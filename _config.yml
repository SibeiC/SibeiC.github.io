# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
url: https://github.chencraft.com
title: Sibei Chen
description: Sibei Chen 的个人主页 · 简历 · 旅行行程。Personal homepage with resume and trip itineraries.
author:
  name: Sibei Chen
  email: contact@chencraft.com
lang: en-US
email: "@chencraft.com"
# repository: required by jekyll-github-metadata (part of github-pages gem) to
# populate site.github.* fields. GitHub Pages infers this from the git remote
# at build time, but Cloudflare Workers Builds doesn't set up a git remote, so
# we declare it explicitly here. Must match the GitHub repo slug exactly.
repository: SibeiC/SibeiC.github.io
github:
  repository_url: https://github.com/SibeiC/

# Build settings
markdown: kramdown
theme: jekyll-theme-hacker
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

cloudflare_analytics: 54ec1fd326e94e19a351e401cb8f9eac

languages: ["en", "zh"]

collections:
  trips:
    output: true
    permalink: /trips/:path/

exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - vendor/
