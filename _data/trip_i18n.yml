  flight: "航班："
  note: "备注："
  manage_booking: 🔗 管理订票
  live_status: 📡 实时状态
  hotels: 🏨 已预订住宿
  nights: 晚
  map: 📍 地图
  overview: 🧭 行程总览
  preferred: "✓ 首选："
  alternatives: "备选："
  stay: "🏨 住宿："
  booking_channels: 🎟️ 订票与购票渠道汇总
