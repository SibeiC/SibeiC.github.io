# UI string table for the trip layout (_layouts/trip.html).
# Keyed by the trip page's `lang:` front-matter value. Supported:
#   - zh-CN (default)
#   - en-US
# Each trip is monolingual; the layout picks one column based on page.lang.
# When adding new chrome labels to the layout, add the key to BOTH languages.
# `weekdays` is indexed by Jekyll's `%w` filter (0=Sun .. 6=Sat).

