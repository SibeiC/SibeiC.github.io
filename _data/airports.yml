# Airport lookup table, keyed by IATA 3-character airport code.
# Build-time data only — not served to visitors.
# The trip layout uses `_data/airports[code].city` as the fallback display
# when a flight entry omits an inline `city:` field. Inline `city:` still
# wins if present (useful for rare airports not in this file).
#
# Each entry:
#   city: <string>  display text shown under the IATA code in flight row
#                   (typical format: "城市 机场名", mixing Chinese + optional English)
#
# Add a new airport when you encounter one. AI agents generating trip files
# should extend this file rather than hard-coding `city:` per flight.

