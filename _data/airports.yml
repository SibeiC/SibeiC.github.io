# Airport lookup table, keyed by IATA 3-character airport code.
# Build-time data only — not served to visitors.
# The trip layout uses `_data/airports[code].city_{en|zh}` as the fallback
# display when a flight entry omits an inline `city:` field. Inline `city:`
# still wins if present (useful for rare airports not in this file).
#
# Each entry:
#   city_en: <string>   display text in English (for lang: en-US trips)
#                        format: "City AirportName" (e.g. "Singapore Changi")
#   city_zh: <string>   display text in Chinese (for lang: zh-CN trips)
#                        format: "城市 机场名" (e.g. "新加坡 樟宜")
#
# Layout picks city_en or city_zh based on the trip's lang: front-matter field.
# When adding a new airport, populate BOTH keys so any future trip can use it.

