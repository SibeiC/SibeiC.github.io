# Airline lookup table, keyed by IATA 2-character airline code.
# This file is read at Jekyll build time only — it is NOT served to visitors.
# The trip layout inlines resolved URLs into the generated HTML.
#
# Each entry needs:
#   name_en:        <string>   display name in English (for lang: en-US trips)
#   name_zh:        <string>   display name in Chinese (for lang: zh-CN trips)
#   icao:           <string>   ICAO 3-char code, used in FlightAware URL path
#   manage_booking: <string>   carrier's "manage booking" / check-in portal
#
# Layout picks name_en or name_zh based on the trip's lang: front-matter field.
# When adding a new airline, populate BOTH name_en and name_zh — the file is
# language-agnostic so any future trip (either language) can consume it.

