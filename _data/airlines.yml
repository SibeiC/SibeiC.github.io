# Airline lookup table, keyed by IATA 2-character airline code.
# This file is read at Jekyll build time only — it is NOT served to visitors.
# The trip layout inlines resolved URLs into the generated HTML.
#
# Each entry needs:
#   name:           <string>   display name in Chinese (or any language)
#   icao:           <string>   ICAO 3-char code, used in FlightAware URL path
#   manage_booking: <string>   carrier's "manage booking" / check-in portal
#
# Add a new airline when you encounter one — AI agents generating new trip
# files should extend this file rather than hard-coding links per-trip.

